<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Controle</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="main.css">
</head>
<body class="principal">

  <!-- Header -->
  <div class="header text-center py-3">
    <h2>Painel De Controle</h2>
  </div>

  <!-- Painel de Controle -->
  <div class="container my-4">
    <div class="text-center mb-4">
      <h3>Monitoramento Atual</h3>
      
    </div>
    <div class="row g-4">

      <!-- Cartão Temperatura -->
      <div class="col-md-4">
        <div class="card text-center p-3 temperatura-card">
          <h5>Temperatura</h5>
          <h2>25°C</h2>
          <i class="bi bi-thermometer-high fs-1"></i>
        </div>
      </div>

      <!-- Cartão Umidade -->
      <div class="col-md-4">
        <div class="card text-center p-3 umidade-card">
          <h5>Umidade</h5>
          <h2>60%</h2>
          <i class="bi bi-droplet fs-1"></i>
        </div>
      </div>

      <!-- Cartão Luz -->
      <div class="col-md-4">
        <div class="card text-center p-3 luz-card">
          <h5>Luz</h5>
          <h2>800 lux</h2>
          <i class="bi bi-lightbulb fs-1"></i>
        </div>
      </div>
    </div>

    <!-- Controles -->
    <div class="text-center mt-5">
      <h4>Controles</h4>
    </div>

    <div class="row mt-3 g-4">
      <!-- Botão Ventilação -->
      <div class="col-md-6">
        <button class="btn control-btn desligado">Ventilação:</button>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="ventilacao" id="ligarVentilacao" value="ligar" />
          <label class="form-check-label" for="ligarVentilacao">Ligar</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="ventilacao" id="desligarVentilacao" value="desligar" />
          <label class="form-check-label" for="desligarVentilacao">Desligar</label>
        </div>
      </div>

      <!-- Botão Iluminação -->
      <div class="col-md-6">
        <button class="btn control-btn desligado">Iluminação:</button>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="iluminacao" id="ligarIluminacao" value="ligar" />
          <label class="form-check-label" for="ligarIluminacao">Ligar</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="iluminacao" id="desligarIluminacao" value="desligar" />
          <label class="form-check-label" for="desligarIluminacao">Desligar</label>
        </div>
      </div>
    </div>
  </div>

  <!-- Link do Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
